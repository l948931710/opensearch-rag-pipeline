name: CI

# Roadmap-to-8 EVAL-3: the previously-absent CI gate. Runs the full test suite in SIMULATE mode on
# every push to main and every PR — catching extractor/chunker/retriever/serving regressions before
# they merge (the dim9 "no CI / advisory gates" gap). No cloud creds: RAG_SIMULATE forces hash
# embeddings + mock HA3, and DB-integration tests self-skip without a local MySQL (skipif_no_db).
# Live layers (run_eval l3/l4/l5 + l1/l2 against real HA3) stay manual/staged — they need creds,
# the gold set, and the out-of-repo data repo, so they are deliberately NOT in this blocking gate.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RAG_SIMULATE: "true"
      RAG_SIMULATE_API: "true"
      RAG_SIMULATE_DB: "true"
      RAG_SIMULATE_OSS: "true"
      RAG_SIMULATE_OPENSEARCH: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,production,ocr,api]"
      - name: Lint (ruff — informational; pre-existing baseline not yet zeroed)
        continue-on-error: true
        run: python -m ruff check opensearch_pipeline/ tests/
      - name: Test (simulate mode — no external services)
        run: python -m pytest tests/ -q -p no:cacheprovider

  # 前端门（console-app Vite/Vue3）：此前完全无 CI——135 个 vitest 与 vue-tsc 类型检查从未在
  # 合并前跑过。本 job 把它们设为【阻塞】门：build 含 vue-tsc 类型检查（package.json:8），故无需
  # 单独 typecheck 步。node 22 对齐本地工具链；构建产物（next-dist/）gitignore，仅作编译校验。
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: console-app/package-lock.json
      - name: Install (npm ci)
        run: npm ci
      - name: Test (vitest)
        run: npm run test
      - name: Build (vue-tsc 类型检查 + vite build)
        run: npm run build
