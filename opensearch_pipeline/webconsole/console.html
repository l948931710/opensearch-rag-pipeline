<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>富岭知识库管理</title>
  <!-- 钉钉 jsapi（HTTPS 脚本，HTTP 页面可加载）。用于 PC/移动端免登 requestAuthCode。 -->
  <script src="https://g.alicdn.com/dingding/dingtalk-jsapi/3.0.25/dingtalk.open.js"></script>
  <style>
    :root { --brand:#15604a; --surface:#ffffff; --page:#fbf8f1; --line:#ece6da; --text1:#2b2b27; --text3:#8a8273; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; background:var(--page); color:var(--text1); font:15px/1.5 -apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
    .wrap { max-width:880px; margin:0 auto; padding:20px 16px 64px; }
    h1 { font-size:20px; margin:8px 0 4px; color:var(--brand); }
    .sub { color:var(--text3); font-size:13px; margin-bottom:16px; }
    .card { background:var(--surface); border-radius:14px; box-shadow:0 1px 6px rgba(21,96,74,.06); padding:18px 18px; margin-bottom:16px; }
    .row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .badge { font-size:12px; color:#fff; background:var(--brand); border-radius:10px; padding:2px 10px; }
    label { display:block; font-size:13px; color:var(--text3); margin:12px 0 4px; }
    input[type=text], select { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font-size:15px; background:#fff; }
    input[type=file] { width:100%; font-size:14px; margin-top:4px; }
    button { background:var(--brand); color:#fff; border:0; border-radius:10px; padding:11px 18px; font-size:15px; cursor:pointer; }
    button[disabled] { opacity:.5; cursor:not-allowed; }
    .muted { color:var(--text3); font-size:13px; }
    .err { color:#b3261e; font-size:13px; white-space:pre-wrap; word-break:break-all; }
    .ok { color:var(--brand); }
    .doc { border-top:1px solid var(--line); padding:12px 0; }
    .doc:first-child { border-top:0; }
    .doc-title { font-weight:600; }
    .doc-meta { color:var(--text3); font-size:12px; margin-top:3px; }
    .pill { font-size:11px; border-radius:9px; padding:1px 8px; margin-left:8px; }
    .pill.ok{background:#e6f4ee;color:#15604a;} .pill.busy{background:#fff3da;color:#9a6b00;}
    .pill.queue{background:#eef0f2;color:#5a6470;} .pill.warn{background:#fde9d9;color:#a8520f;}
    .pill.fail{background:#fde8e6;color:#b3261e;} .pill.muted{background:#eef0f2;color:#8a8273;}
    #diag { font-size:12px; color:var(--text3); background:#f4f1ea; border-radius:10px; padding:10px 12px; margin-top:14px; }
    #diag div { padding:1px 0; }
    .hidden { display:none; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>富岭知识库管理</h1>
  <div class="sub">部门管理员文档上传 / 版本 / 状态（电脑端）</div>

  <div class="card" id="loginCard">
    <div id="loginMsg" class="muted">正在登录…</div>
    <div id="loginErr" class="err"></div>
  </div>

  <div class="card hidden" id="identCard">
    <div class="row"><strong id="identName"></strong><span class="badge" id="identRole"></span></div>
    <div class="muted" id="identScope" style="margin-top:6px"></div>
  </div>

  <div class="card hidden" id="uploadCard">
    <strong>上传新文档</strong>
    <label>选择文件（.pdf .docx .xlsx .pptx .jpg .png）</label>
    <input type="file" id="file" accept=".pdf,.docx,.xlsx,.pptx,.jpg,.jpeg,.png" />
    <label>标题（可空，默认用文件名）</label>
    <input type="text" id="title" placeholder="文档标题" />
    <label>归属部门（owner_dept）</label>
    <select id="ownerDept"></select>
    <label>可见范围</label>
    <select id="perm">
      <option value="dept_internal">仅本部门可见</option>
      <option value="public">全公司可见（可能需审批）</option>
      <option value="restricted">受限（不进检索，仅归档）</option>
    </select>
    <div style="margin-top:16px" class="row">
      <button id="uploadBtn">上传</button>
      <span id="uploadMsg" class="muted"></span>
    </div>
    <div id="uploadErr" class="err"></div>
  </div>

  <div class="card hidden" id="docsCard">
    <div class="row" style="justify-content:space-between">
      <strong>我的文档</strong>
      <span class="muted" id="docsCount"></span>
    </div>
    <div id="docs"></div>
  </div>

  <div id="diag"><div><strong>诊断（免登/HTTP 调试用）</strong></div></div>
</div>

<script>
(function () {
  var BASE = location.origin;            // 同源：H5 与 API 同一主机
  var token = '', role = '', canManage = false;
  var GROUP_LABEL = { finance:'财务', it:'信息技术', marketing:'营销', production:'生产', pmc:'计划PMC', admin:'行政', hr:'人力资源', rd:'研发', quality:'品质技术', supply:'资材供应' };
  var BADGE_CLASS = { '已上线':'ok','处理中':'busy','排队中':'queue','待审核':'warn','处理失败':'fail','已退役':'muted','内容未变':'muted' };

  function $(id){ return document.getElementById(id); }
  function show(id){ $(id).classList.remove('hidden'); }
  function diag(msg){ var d=document.createElement('div'); d.textContent='• '+msg; $('diag').appendChild(d); }
  function qs(name){ var m=new RegExp('[?&]'+name+'=([^&]+)').exec(location.search); return m?decodeURIComponent(m[1]):''; }

  function api(path, opts){
    opts = opts || {};
    var h = { 'Content-Type':'application/json' };
    if (opts.auth && token) h['Authorization'] = 'Bearer ' + token;
    return fetch(BASE + path, { method: opts.method||'GET', headers: h, body: opts.body?JSON.stringify(opts.body):undefined })
      .then(function(r){ return r.json().then(function(j){ if(!r.ok){ var e=new Error((j&&j.detail)||('HTTP '+r.status)); e.status=r.status; throw e; } return j; }); });
  }

  // ── 1. 取得身份：web-view 传入 token（优先，免登已由小程序做）/ 独立 PC 访问地址走 requestAuthCode ──
  function login(){
    diag('query=' + (location.search || '(无)'));
    var passedToken = qs('token');
    if (passedToken){
      token = passedToken;
      diag('web-view 模式：用小程序传入的 token');
      api('/api/kb/whoami', { auth:true })
        .then(function(w){ role = w.role||'employee'; canManage = !!w.can_manage_kb; afterAuth(qs('name') || w.display_name || w.user_id); })
        .catch(function(e){ $('loginMsg').textContent=''; $('loginErr').textContent='身份校验失败：'+e.message; diag('whoami FAIL: '+e.message); });
      return;
    }
    // 独立 PC 访问地址模式：requestAuthCode 免登。corpId URL 优先（大小写都认），兜底用本企业常量（非密钥）
    var corpId = qs('corpId') || qs('corpid') || qs('corpID') || 'dingcafb3fdca0e8380a';
    diag('corpId=' + (corpId||'(空)'));
    if (typeof dd === 'undefined') {
      $('loginMsg').textContent=''; $('loginErr').textContent='未检测到钉钉环境（dd 未定义）。请在钉钉客户端中打开本页面。'; diag('dd undefined → 非钉钉环境'); return;
    }
    dd.ready(function(){
      diag('dd.ready 触发');
      dd.runtime.permission.requestAuthCode({
        corpId: corpId,
        onSuccess: function(res){ diag('requestAuthCode OK, code=' + (res&&res.code?res.code.slice(0,8)+'…':'?')); exchange(res.code); },
        onFail: function(err){ $('loginMsg').textContent=''; $('loginErr').textContent='免登失败（requestAuthCode）：' + JSON.stringify(err); diag('requestAuthCode FAIL'); }
      });
    });
    dd.error(function(err){ diag('dd.error: ' + JSON.stringify(err)); });
  }

  function exchange(code){
    api('/api/auth/dingtalk', { method:'POST', body:{ auth_code: code } })
      .then(function(data){
        token = data.token||''; role = data.role||'employee'; canManage = !!data.can_manage_kb;
        diag('换令牌 OK，role=' + role + ' can_manage_kb=' + canManage);
        afterAuth(data.display_name || data.user_id);
      })
      .catch(function(e){ $('loginMsg').textContent=''; $('loginErr').textContent='换取令牌失败：'+e.message; diag('exchange FAIL: '+e.message); });
  }

  // 两种模式拿到身份后统一渲染
  function afterAuth(displayName){
    diag('身份就绪，role=' + role + ' can_manage_kb=' + canManage);
    $('loginCard').classList.add('hidden');
    $('identName').textContent = displayName || '';
    $('identRole').textContent = role==='kb_admin'?'知识库管理员':(role==='dept_admin'?'部门管理员':'员工');
    show('identCard');
    if (!canManage){ $('identScope').textContent='你不是知识库管理员，无上传权限。'; return; }
    loadOrgTree(); loadDocs();
  }

  // ── 2. 归属部门下拉（来自本人 managed_owner_depts）──
  function loadOrgTree(){
    api('/api/kb/org-tree', { auth:true }).then(function(t){
      var sel = $('ownerDept'); sel.innerHTML='';
      (t.my_managed_owner_depts||[]).forEach(function(o){
        var op=document.createElement('option'); op.value=o; op.textContent=(GROUP_LABEL[o]||o); sel.appendChild(op);
      });
      $('identScope').textContent = '可管理部门：' + (t.my_managed_owner_depts||[]).map(function(o){return GROUP_LABEL[o]||o;}).join('、');
      show('uploadCard');
    }).catch(function(e){ diag('org-tree FAIL: '+e.message); });
  }

  // ── 3. 文档列表 ──
  function loadDocs(){
    api('/api/kb/my-docs?limit=50', { auth:true }).then(function(r){
      var box=$('docs'); box.innerHTML='';
      var items=r.items||[];
      $('docsCount').textContent=items.length+' 篇';
      if(!items.length){ box.innerHTML='<div class="muted" style="padding:10px 0">暂无文档</div>'; }
      items.forEach(function(d){
        var el=document.createElement('div'); el.className='doc';
        var cls=BADGE_CLASS[d.status_badge]||'muted';
        el.innerHTML='<div class="doc-title">'+esc(d.title||d.original_filename||d.doc_id)+'<span class="pill '+cls+'">'+esc(d.status_badge||'')+'</span></div>'+
          '<div class="doc-meta">'+esc(d.owner_dept||'')+' · v'+(d.current_version_no||1)+' · '+esc(d.permission_level||'')+' · '+esc((d.updated_at||'').slice(0,16))+'</div>';
        box.appendChild(el);
      });
      show('docsCard');
    }).catch(function(e){ diag('my-docs FAIL: '+e.message); });
  }

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  // ── 4. 上传：upload-url → PUT OSS → register ──
  $('uploadBtn').onclick = function(){
    var f = $('file').files[0];
    if(!f){ $('uploadErr').textContent='请先选择文件'; return; }
    $('uploadErr').textContent=''; $('uploadBtn').disabled=true; $('uploadMsg').textContent='申请上传地址…';
    var payload = { action:'new', filename:f.name, owner_dept:$('ownerDept').value, permission_level:$('perm').value, title:$('title').value||undefined };
    var docId='';
    api('/api/kb/upload-url', { method:'POST', auth:true, body:payload })
      .then(function(u){
        docId=u.doc_id; $('uploadMsg').textContent='上传文件到 OSS…';
        return fetch(u.put_url, { method:'PUT', body:f }).then(function(r){ if(!r.ok) throw new Error('OSS PUT 失败 HTTP '+r.status+'（可能需在 OSS 桶配置 CORS 允许本页来源 PUT）'); return u.upload_token; });
      })
      .then(function(uploadToken){ $('uploadMsg').textContent='登记…'; return api('/api/kb/register', { method:'POST', auth:true, body:{ upload_token: uploadToken } }); })
      .then(function(reg){
        $('uploadBtn').disabled=false;
        $('uploadMsg').innerHTML='<span class="ok">已提交：'+esc(reg.doc_id)+' v'+reg.version_no+'（'+esc(reg.status_badge||'')+(reg.requires_kb_admin_approval?'，待审批':'')+'）</span>';
        $('file').value=''; $('title').value=''; loadDocs();
      })
      .catch(function(e){ $('uploadBtn').disabled=false; $('uploadMsg').textContent=''; $('uploadErr').textContent='上传失败：'+e.message; diag('upload FAIL: '+e.message); });
  };

  login();
})();
</script>
</body>
</html>
